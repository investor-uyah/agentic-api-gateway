<!DOCTYPE html>
<html>
<head>
    <title>Agent Gateway Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #22c55e;
            --text-muted: #94a3b8;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #fff; padding: 20px; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        h1 { margin-top: 0; }
        
        #login-area { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; width: fit-content; flex-wrap: wrap; }
        input { padding:12px; border-radius:8px; border: 1px solid #334155; background: #020617; color: white; width:300px; outline: none; }
        input:focus { border-color: var(--accent); }
        button { padding:12px 20px; border-radius:8px; background: var(--accent); border: none; color: #0f172a; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }

        .main-layout { display: flex; gap: 20px; flex: 1; overflow: hidden; }
        
        /* Responsive Layout Handling */
        @media (max-width: 1024px) {
            body { overflow-y: auto; height: auto; }
            .main-layout { flex-direction: column; overflow: visible; }
            #history { width: 100% !important; border-left: none !important; border-top: 1px solid #1e293b; margin-top: 20px; }
            .content-area { overflow: visible !important; }
        }

        .content-area { flex: 1; overflow-y: auto; padding-right: 10px; }
        
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; margin: 0 10px 20px 0; display: inline-block; min-width: 200px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .card h3 { margin: 0 0 10px 0; font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .card p { margin: 0; font-size: 24px; font-weight: bold; }
        .grid { display: flex; flex-wrap: wrap; }
        .highlight { border: 2px solid var(--accent); }

        #history { 
            width: 300px; 
            background: #020617; 
            padding: 20px; 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            border-left: 1px solid #1e293b;
            min-height: 400px;
        }
        #history h3 { margin-top: 0; display: flex; align-items: center; gap: 8px; font-size: 16px; }
        #history-list { flex: 1; overflow-y: auto; padding-right: 5px; }
        .history-item { 
            background: #1e293b; 
            margin-bottom: 12px; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 13px; 
            border-left: 4px solid var(--accent);
        }
        .history-item b { color: var(--text-muted); font-size: 11px; display: block; margin-bottom: 5px; }
        .history-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        
        #last-updated { margin-bottom: 15px; color: var(--text-muted); font-size: 14px; height: 20px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<h1>🚀 Agent Gateway</h1>

<div id="login-area">
    <input type="password" id="tokenInput" placeholder="Enter Service API Token" />
    <button onclick="startDashboard()">Connect to Metrics</button>
</div>

<div id="last-updated">Waiting for data...</div>

<div class="main-layout">
    <div class="content-area">
        <div class="grid" id="metrics">
            <p style="color: var(--text-muted)">Please enter a token to monitor activity.</p>
        </div>
    </div>

    <div id="history">
        <h3>📊 Activity History</h3>
        <div id="history-list">
            <p style="color: #475569; font-size: 12px;">Only active traffic snapshots are recorded here.</p>
        </div>
    </div>
</div>

<script>
let TOKEN = null;
let lastKnownRequests = null;
let pollTimer = null;

function startDashboard() {
    const input = document.getElementById("tokenInput");
    TOKEN = input.value;

    if (!TOKEN) return alert("Token required");

    // Clear previous interval
    if (pollTimer) clearInterval(pollTimer);

    // Reset state
    lastKnownRequests = null;
    localStorage.removeItem("metrics_history");

    document.getElementById("metrics").innerHTML = "<p>Connecting...</p>";
    document.getElementById("history-list").innerHTML =
        '<p style="color: #475569; font-size: 12px;">Waiting for traffic snapshots...</p>';

    loadMetrics();
    pollTimer = setInterval(loadMetrics, 2000);

    document.getElementById("login-area").style.opacity = "0.7";
}

async function loadMetrics() {
    if (!TOKEN) return;

    try {
        const res = await fetch(`/metrics`, {
            headers: { "X-API-Token": TOKEN }
        });

        if (!res.ok) {
            if (res.status === 401) throw new Error("Unauthorized: Invalid Token");
            throw new Error(`Error: ${res.status}`);
        }

        const result = await res.json();

        // Safe extraction (supports both shapes)
        const apiData = result.data || {};
        const summary = apiData.summary || result.summary || {};
        const avgLat = apiData.avg_latency || result.avg_latency || 0;

        const total = Number(summary["Inbound API Requests"] || 0);
        const hits = Number(summary["Cache Hits"] || 0);
        const misses = Number(summary["Cache Misses"] || 0);
        const rate = total > 0 ? ((hits / total) * 100).toFixed(2) : "0.00";

        const now = new Date();

        // Always update header
        document.getElementById("last-updated").innerHTML = 
            `🟢 Live Tracking: <b>${result.service || 'Active Service'}</b> | Last update: ${now.toLocaleTimeString()}`;

        // Render cards
        const container = document.getElementById("metrics");
        container.innerHTML = "";

        for (let [key, val] of Object.entries(summary)) {
            container.innerHTML += `<div class="card"><h3>${key}</h3><p>${val}</p></div>`;
        }

        container.innerHTML += `<div class="card"><h3>Latency</h3><p>${avgLat}s</p></div>`;
        container.innerHTML += `<div class="card highlight"><h3>Hit Rate</h3><p>${rate}%</p></div>`;

        // Initialize baseline (prevents fake spike)
        if (lastKnownRequests === null) {
            lastKnownRequests = total;
        } else {
            const delta = total - lastKnownRequests;

            // Only log real new traffic
            if (delta > 0) {
                saveHistory({
                    time: now.toLocaleTimeString(),
                    requests: delta, // ✅ important: shows actual activity
                    hits: hits,
                    misses: misses,
                    rate: rate
                });

                lastKnownRequests = total;
            }
        }

        // Always render history
        renderHistory();

    } catch (err) {
        document.getElementById("metrics").innerHTML =
            `<p style="color:#ef4444; background:#450a0a; padding:15px; border-radius:8px;">⚠️ ${err.message}</p>`;
    }
}

function saveHistory(entry) {
    let history = JSON.parse(localStorage.getItem("metrics_history") || "[]");

    // Prevent duplicate entries
    if (history.length > 0 && history[0].time === entry.time && history[0].requests === entry.requests) {
        return;
    }

    history.unshift(entry);

    // Keep last 10
    if (history.length > 10) {
        history = history.slice(0, 10);
    }

    localStorage.setItem("metrics_history", JSON.stringify(history));
}

function renderHistory() {
    const history = JSON.parse(localStorage.getItem("metrics_history") || "[]");
    const container = document.getElementById("history-list");

    if (history.length === 0) {
        container.innerHTML =
            '<p style="color: #475569; font-size: 12px;">Waiting for traffic snapshots...</p>';
        return;
    }

    container.innerHTML = "";

    history.forEach(item => {
        container.innerHTML += `
            <div class="history-item">
                <b>${item.time}</b>
                <div class="history-grid">
                    <span>Req: ${item.requests}</span>
                    <span>Hit: ${item.hits}</span>
                    <span>Miss: ${item.misses}</span>
                    <span style="color:var(--accent)">${item.rate}%</span>
                </div>
            </div>
        `;
    });
}
</script>
</body>
</html>
